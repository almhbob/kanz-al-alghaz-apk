name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - 'kanz-al-alghaz/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: mobile
        run: npm install

      - name: Sync web assets into Android project
        working-directory: mobile
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ubuntu-latest runners ship with an Android SDK already installed at
      # $ANDROID_HOME; just make sure the packages we need are present there
      # instead of installing a second SDK at a different path (Gradle
      # refuses to build if ANDROID_HOME and ANDROID_SDK_ROOT disagree).
      - name: Ensure required Android SDK packages are installed
        run: |
          SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -maxdepth 2 -name sdkmanager | sort | tail -n1)"
          echo "using sdkmanager at: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x mobile/android/gradlew

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kanz-al-alghaz-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
