name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - 'kanz-al-alghaz/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: mobile
        run: npm install

      - name: Sync web assets into Android project
        working-directory: mobile
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ubuntu-latest runners ship with an Android SDK already installed at
      # $ANDROID_HOME; just make sure the packages we need are present there
      # instead of installing a second SDK at a different path (Gradle
      # refuses to build if ANDROID_HOME and ANDROID_SDK_ROOT disagree).
      - name: Ensure required Android SDK packages are installed
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          SDK_BASE="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          echo "SDK_BASE=$SDK_BASE"
          find "$SDK_BASE" -maxdepth 3 2>/dev/null || echo "SDK_BASE does not exist"
          SDKMANAGER="$(find "$SDK_BASE" -maxdepth 4 -type f -name sdkmanager 2>/dev/null | sort | tail -n1)"
          echo "using sdkmanager at: $SDKMANAGER"
          if [ -z "$SDKMANAGER" ]; then
            echo "::error::sdkmanager not found anywhere under $SDK_BASE"
            exit 1
          fi
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x mobile/android/gradlew

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kanz-al-alghaz-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Actions artifacts are served from Azure blob storage, which isn't
      # reachable from the environment that needs this file. Commit it into
      # the repo instead so it can be pulled over plain git/GitHub API.
      - name: Publish APK into the repository
        run: |
          mkdir -p dist
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk dist/app-debug.apk
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add dist/app-debug.apk
          git commit -m "chore: publish built debug APK [skip ci]" || echo "nothing to commit"
          git push
